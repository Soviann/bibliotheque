services:
  nginx:
    build:
      args:
        - VITE_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_ID}
      context: ..
      dockerfile: backend/docker/nginx/Dockerfile
    depends_on:
      php:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    volumes:
      - media:/var/www/html/public/media:ro
      - uploads:/var/www/html/public/uploads:ro

  php:
    build: .
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 2>/dev/null | grep -q pong"]
      interval: 10s
      retries: 10
      start_period: 60s
      timeout: 5s
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - DATABASE_URL=mysql://biblio:${MYSQL_PASSWORD}@db:3306/bibliotheque?serverVersion=10.11.0-MariaDB&charset=utf8mb4
      - DEFAULT_URI=${DEFAULT_URI}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE:-}
      - JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
      - JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_MODELS=${GEMINI_MODELS}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - OAUTH_ALLOWED_EMAIL=${OAUTH_ALLOWED_EMAIL}
      - OAUTH_GOOGLE_ID=${OAUTH_GOOGLE_ID}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SYMFONY_DECRYPTION_SECRET=${SYMFONY_DECRYPTION_SECRET}
    restart: unless-stopped
    volumes:
      - app_var:/var/www/html/var
      - jwt_keys:/var/www/html/config/jwt
      - media:/var/www/html/public/media
      - uploads:/var/www/html/public/uploads

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=bibliotheque
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=biblio
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_var:
  db_data:
  jwt_keys:
  media:
  uploads:
