services:
  app:
    image: ghcr.io/soviann/bibliotheque:${TAG:-latest}
    build:
      context: ..
      dockerfile: backend/Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_ID}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/"]
      interval: 15s
      retries: 5
      start_period: 90s
      timeout: 5s
    environment:
      - APP_ENV=prod
      - APP_SECRET=${APP_SECRET}
      - COMICVINE_API_KEY=${COMICVINE_API_KEY}
      - CORS_ALLOW_ORIGIN=${CORS_ALLOW_ORIGIN}
      - DATABASE_URL=mysql://biblio:${MYSQL_PASSWORD}@db:3306/bibliotheque?serverVersion=10.11.0-MariaDB&charset=utf8mb4
      - DEFAULT_URI=${DEFAULT_URI}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE:-}
      - JWT_PUBLIC_KEY=%kernel.project_dir%/config/jwt/public.pem
      - JWT_SECRET_KEY=%kernel.project_dir%/config/jwt/private.pem
      - MESSENGER_TRANSPORT_DSN=doctrine://default
      - GEMINI_API_KEYS=${GEMINI_API_KEYS}
      - GEMINI_MODELS=${GEMINI_MODELS}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - OAUTH_ALLOWED_EMAIL=${OAUTH_ALLOWED_EMAIL}
      - OAUTH_GOOGLE_ID=${OAUTH_GOOGLE_ID}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - SYMFONY_DECRYPTION_SECRET=${SYMFONY_DECRYPTION_SECRET}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    volumes:
      - app_var:/app/var
      - jwt_keys:/app/config/jwt
      - media:/app/public/media
      - uploads:/app/public/uploads

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=bibliotheque
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=biblio
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5
      timeout: 5s
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_var:
  db_data:
  jwt_keys:
  media:
  uploads:
