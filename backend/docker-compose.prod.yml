env_file:
  - .env.prod
  - path: .env.local
    required: false

services:
  app:
    build: .
    depends_on:
      - db
    environment:
      - APP_ENV=prod
      - DATABASE_URL=mysql://biblio:${MYSQL_PASSWORD}@db:3306/bibliotheque?serverVersion=10.11.0-MariaDB&charset=utf8mb4
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_BOOKS_API_KEY=${GOOGLE_BOOKS_API_KEY}
      - SYMFONY_DECRYPTION_SECRET=${SYMFONY_DECRYPTION_SECRET}
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - app_var:/var/www/html/var

  db:
    image: mariadb:10.11
    environment:
      - MYSQL_DATABASE=bibliotheque
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_USER=biblio
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/mysql

volumes:
  app_var:
  db_data:
