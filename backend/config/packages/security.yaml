security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt)/
            security: false
        api:
            pattern: ^/api/
            stateless: true
            jwt: ~

    access_control:
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api/login/google$, roles: PUBLIC_ACCESS }
        - { path: ^/api/, roles: ROLE_USER }

when@dev:
    security:
        access_control:
            - { path: ^/api/docs, roles: PUBLIC_ACCESS }
            - { path: ^/api/login/google$, roles: PUBLIC_ACCESS }
            - { path: ^/api/login/dev$, roles: PUBLIC_ACCESS }
            - { path: ^/api/, roles: ROLE_USER }
