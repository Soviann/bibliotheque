[supervisord]
nodaemon=true
user=root

[program:messenger]
command=gosu www-data php /var/www/html/backend/bin/console messenger:consume async --limit=500 --time-limit=3600
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0

[program:scheduler]
command=gosu www-data php /var/www/html/backend/bin/console schedule:run
autostart=true
autorestart=true
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
