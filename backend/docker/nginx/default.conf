server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 12M;

    # En-tetes de securite (inclus au niveau server et dans chaque location avec add_header)
    include /etc/nginx/conf.d/security-headers.conf;

    # Assets frontend (cache long, hash dans le nom)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # API -> PHP-FPM (Symfony)
    location ~ ^/api(/|$) {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 30s;
    }

    # Uploads (couvertures) — volume partage
    location /uploads/ {
        alias /var/www/html/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Thumbnails LiipImagine — volume partagé
    # Sert les miniatures pré-générées. Fallback vers PHP-FPM si le fichier
    # n'existe pas encore (génération à la volée par LiipImagine).
    # Note : root (pas alias) pour que try_files résolve correctement $uri.
    location /media/ {
        root /var/www/html/public;
        expires 30d;
        add_header Cache-Control "public";
        include /etc/nginx/conf.d/security-headers.conf;
        try_files $uri @liip_imagine;
    }

    location @liip_imagine {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
    }

    # PWA : manifest, service worker, icones
    location ~* \.(webmanifest|ico)$ {
        expires 7d;
    }

    # SPA fallback — React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;
}
