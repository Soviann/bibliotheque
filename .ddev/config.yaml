name: bibliotheque
type: php
docroot: backend/public
php_version: "8.3"
webimage_extra_packages:
  - build-essential
  - zsh
webserver_type: nginx-fpm
database:
  type: mariadb
  version: "10.11"
upload_dirs:
  - uploads/covers
bind_all_interfaces: true
additional_hostnames:
  - test.bibliotheque
use_dns_when_possible: true
composer_version: "2"
composer_root: backend
corepack_enable: false

web_extra_exposed_ports:
  - name: vite
    container_port: 5173
    http_port: 5172
    https_port: 5173
  - name: vite-preview
    container_port: 4173
    http_port: 4172
    https_port: 4173

web_extra_daemons:
  - name: vite
    command: bash -c 'cd /var/www/html/frontend && npm install && npm run dev'
    directory: /var/www/html/frontend
  - name: messenger-worker
    command: bash -c 'cd /var/www/html/backend && php bin/console messenger:consume async --limit=500 --time-limit=3600'
    directory: /var/www/html/backend
  - name: scheduler
    command: bash -c 'cd /var/www/html/backend && php bin/console messenger:consume scheduler_default --time-limit=3600'
    directory: /var/www/html/backend
