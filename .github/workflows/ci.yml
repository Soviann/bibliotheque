name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint Backend (PHPStan + CS Fixer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, intl, gd
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Warm up Symfony cache (PHPStan needs container XML)
        working-directory: backend
        run: php bin/console cache:warmup --env=dev

      - name: Run PHPStan
        working-directory: backend
        run: vendor/bin/phpstan analyse --no-progress

      - name: Run PHP-CS-Fixer (dry-run)
        working-directory: backend
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  lint-frontend:
    name: Lint Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

  test-backend:
    name: Test Backend (PHPUnit)
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: db_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_USER: app
          MARIADB_PASSWORD: app
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: mysql://app:app@127.0.0.1:3306/db?serverVersion=10.11.0-MariaDB&charset=utf8mb4
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, intl, gd
          tools: composer:v2

      - name: Install Composer dependencies
        working-directory: backend
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keypair
        working-directory: backend
        run: php bin/console lexik:jwt:generate-keypair --skip-if-exists --env=test

      - name: Run database migrations
        working-directory: backend
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Run PHPUnit
        working-directory: backend
        run: vendor/bin/phpunit

  test-frontend:
    name: Test Frontend (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Vitest
        working-directory: frontend
        run: npx vitest run
